<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Admin HME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#eef2ff,#ffffff);
    }

    .login-box{
      background:#fff;
      padding:40px;
      border-radius:16px;
      width:320px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.1);
      animation:fadeIn 0.5s ease;
    }

    .login-box img{
      width:60px;
      margin-bottom:15px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:14px;
    }

    button{
      width:100%;
      padding:12px;
      background:linear-gradient(135deg,#2563eb,#1e40af);
      color:#fff;
      border:none;
      border-radius:8px;
      font-weight:600;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      opacity:0.9;
    }

    #status{
      margin-top:10px;
      font-size:14px;
      color:red;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<div class="login-box">
  <img src="logo.PNG">
  <h2>Login Admin</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 CONFIG PUNYA KAMU
const firebaseConfig = {
  apiKey: "ISI_PUNYA_KAMU",
  authDomain: "ISI_PUNYA_KAMU",
  projectId: "ISI_PUNYA_KAMU",
  storageBucket: "ISI_PUNYA_KAMU",
  messagingSenderId: "ISI_PUNYA_KAMU",
  appId: "ISI_PUNYA_KAMU"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 ADMIN EMAIL
const adminEmails = [
  "EMAIL_KAMU@gmail.com"
];

// LOGIN FUNCTION
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      if(adminEmails.includes(user.email)){
        document.getElementById("status").style.color = "green";
        document.getElementById("status").innerText = "Login berhasil!";
        
        // 👉 nanti ke admin page
        setTimeout(()=>{
          window.location.href = "admin.html";
        },1000);

      } else {
        document.getElementById("status").innerText = "Bukan admin!";
      }
    })
    .catch((error) => {
      document.getElementById("status").innerText = "Email / Password salah!";
    });
}
</script>

</body>
</html>
